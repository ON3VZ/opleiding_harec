<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="../index.html"><span class="brand-mark">RA</span> HAREC Leerplatform</a>
    <div class="spacer"></div>
    <span class="callsign-chip" data-callsign-chip>gast</span>
    <button class="btn-logout" data-logout>Afmelden</button>
    <button class="menu-toggle" aria-label="Menu">&#9776;</button>
  </div>
</header>
<div class="sidebar-backdrop"></div>
<div class="app">
  <main class="content" id="content">
    <div class="crumbs"><a href="../index.html">Overzicht</a> &rsaquo; <a href="h09.html">H9 Propagatie van radiogolven</a> &rsaquo; §9.5</div>
    <div class="chapter-hero">
      <div class="eyebrow">Hoofdstuk 9 · Propagatie van radiogolven</div>
      <h1>9.5 Ruis</h1>
    </div>
    <div id="theory"><p style="color:var(--ink-soft)">Inhoud wordt geladen…</p></div>
    <div class="sub-done-wrap"><button class="btn-primary" id="done-btn">Markeer subhoofdstuk als gelezen</button></div>
    <div class="sub-nav" id="sub-nav"></div>
    </main>
  <aside class="sidebar" id="sidebar">
    <h2>Voortgang</h2>
    <div class="progress-global">
      <div class="progress-bar"><i id="global-bar" style="width:0%"></i></div>
      <div class="progress-label" id="global-label">0 / 75 subhoofdstukken voltooid</div>
    </div>
    <h2>Hoofdstukken</h2>
    <div id="nav-list"></div>
  </aside>
</div>
<script src="../assets/js/app.js"></script>
<script>
  const CHAP_ID='h09', SUB_ID='9.5';
  if(!HAREC.requireLogin()){}
  (async function(){
    await HAREC.loadStructure();
    HAREC.wireHeader();
    HAREC.markSubSeen(SUB_ID);
    // laad theorie-data van dit subhoofdstuk
    const root=document.getElementById('theory');
    try{
      const data=await (await fetch('../data/theorie_h09.json')).json();
      const sub=(data.subhoofdstukken||[]).find(x=>x.id===SUB_ID);
      if(sub && sub.blokken && sub.blokken.length){
        root.innerHTML=sub.blokken.map(b=>HAREC.renderBlock(b)).join('');
        HAREC.wireConcepts(root);
        if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([root]);
      } else {
        root.innerHTML='<div class="box box-info"><div class="box-title">Nog in voorbereiding</div><div>De theorie voor dit subhoofdstuk wordt binnenkort toegevoegd.</div></div>';
      }
    }catch(e){
      root.innerHTML='<div class="box box-info"><div class="box-title">Nog in voorbereiding</div><div>De theorie voor dit hoofdstuk wordt binnenkort toegevoegd.</div></div>';
    }
    // done-knop
    const db=document.getElementById('done-btn');
    function refresh(){ const d=HAREC.isSubDone(SUB_ID); db.textContent=d?'✓ Gelezen — klik om terug te zetten':'Markeer subhoofdstuk als gelezen'; db.classList.toggle('is-done',d); }
    db.addEventListener('click',()=>{ HAREC.toggleSubDone(SUB_ID); refresh(); HAREC.buildSidebar(CHAP_ID,SUB_ID); });
    refresh();
    document.getElementById('sub-nav').innerHTML=`<a class="prev" href="h09-9.4.html"><div class="sn-label">← Vorige</div><div class="sn-title">9.4 Propagatie op zeer hoge frequenties</div></a>`+`<a class="next" href="h09-9.6.html"><div class="sn-label">Volgende →</div><div class="sn-title">9.6 Propagatiebudget (verbindingsbilan)</div></a>`;
    HAREC.buildSidebar(CHAP_ID,SUB_ID);
  })();
</script>
</body>
</html>
